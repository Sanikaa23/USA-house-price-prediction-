<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>USA Housing Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body{font-family:Inter,system-ui,Arial;margin:12px;background:#f5f7fb;color:#111}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:12px;align-items:start}
    .panel{background:#fff;padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    #map{height:480px;border-radius:8px;overflow:hidden}
    .charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    canvas{width:100% !important; height:260px !important}
    .controls .row{margin-bottom:8px}
    label{display:block;font-size:13px;margin-bottom:6px;color:#333}
    input,select{width:100%;padding:8px;border-radius:6px;border:1px solid #e6e9ef;box-sizing:border-box}
    .btn{padding:8px 12px;border-radius:8px;background:#2563eb;color:white;border:none;cursor:pointer}
    #debug{font-family:monospace;font-size:12px;color:#666;margin-top:10px}
    @media (max-width:980px){ .layout{grid-template-columns:1fr} #map{height:360px} }
  </style>
</head>
<body>

  <h2>USA Housing Dashboard</h2>
  <div class="layout">
    <!-- LEFT: Filters -->
    <aside class="panel controls" id="controls">
      <h3 style="margin-top:0">Filters</h3>

      <div class="row">
        <label for="regionFilter">State / Region</label>
        <select id="regionFilter"><option value="">All Regions</option></select>
      </div>

      <div class="row">
        <label>Price (USD)</label>
        <div style="display:flex;gap:8px">
          <input id="priceMin" type="number" placeholder="Min" />
          <input id="priceMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div class="row">
        <label>Bedrooms</label>
        <div style="display:flex;gap:8px">
          <input id="bedsMin" type="number" placeholder="Min" />
          <input id="bedsMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div class="row">
        <label>Rooms</label>
        <div style="display:flex;gap:8px">
          <input id="roomsMin" type="number" placeholder="Min" />
          <input id="roomsMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div class="row">
        <label>Area (sq ft)</label>
        <div style="display:flex;gap:8px">
          <input id="areaMin" type="number" placeholder="Min" />
          <input id="areaMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div class="row">
        <label>House age (years)</label>
        <div style="display:flex;gap:8px">
          <input id="ageMin" type="number" placeholder="Min" />
          <input id="ageMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div class="row">
        <label>Income (USD)</label>
        <div style="display:flex;gap:8px">
          <input id="incomeMin" type="number" placeholder="Min" />
          <input id="incomeMax" type="number" placeholder="Max" />
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="applyFiltersBtn" class="btn">Apply</button>
        <button id="resetFilters" class="btn" style="background:#6b7280">Reset</button>
      </div>

      <div id="filterStatus" class="muted" style="margin-top:10px">Loading data...</div>
      <div id="debug" aria-hidden="true"></div>
    </aside>

    <!-- RIGHT: Map + Charts -->
    <main>
      <div class="panel" id="mapWrap">
        <div id="map" aria-label="Map"></div>
      </div>

      <div class="charts">
        <div class="panel chart-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Avg Price by Region</strong>
            <span id="chartStatus" class="muted">—</span>
          </div>
          <canvas id="priceByRegion"></canvas>
        </div>

        <div class="panel chart-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Price Trend</strong>
            <span id="timeseries-meta" class="muted">—</span>
          </div>
          <canvas id="priceTrend"></canvas>
        </div>

        <div class="panel chart-card" style="grid-column: span 2;">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <strong>Price vs Income (bubble)</strong>
            <span id="scatter-meta" class="muted">—</span>
          </div>
          <canvas id="priceIncomeChart" style="height:360px !important;"></canvas>
        </div>
      </div>
    </main>
  </div>

  <!-- Libraries (correct order). Removed integrity attributes to avoid blocking during dev -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Your project JS (these are the robust files provided earlier) -->
  <script src="js/housingData.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/map.js"></script>
  <script src="js/dashboard-controls.js"></script>

  <!-- Extra: ensure filters are populated after data loads (defensive) -->
  <script>
    (function(){
      const debugEl = document.getElementById('debug');
      function logDebug(msg){ if(debugEl) debugEl.textContent = msg; console.info(msg); }

      // Quick sanity checks when data loads
      window.addEventListener('housingDataLoaded', ()=> {
        logDebug('housingDataLoaded event fired. records=' + (window.housingData?.length || 0));
        // if controls didn't populate, populate region select here as fallback
        try {
          const sel = document.getElementById('regionFilter');
          if (sel && sel.options.length <= 1) {
            const regions = Array.from(new Set((window.housingData || []).map(d => d.state || d.region || d.STATE || 'Unknown'))).filter(Boolean).sort();
            sel.innerHTML = '<option value=\"\">All Regions</option>' + regions.map(r=>`<option value=\"${r}\">${r}</option>`).join('');
            logDebug('Fallback populated regions: ' + regions.length);
          }
          // call applyFilters to render charts & map once data present
          if (window.applyFilters) { window.applyFilters(); } else { logDebug('applyFilters not found'); }
        } catch (e) { console.error(e); }
      });

      // Small UX: wire apply button to window.applyFilters (safe)
      const applyBtn = document.getElementById('applyFiltersBtn');
      if (applyBtn) applyBtn.addEventListener('click', ()=>{ if(window.applyFilters) window.applyFilters(); });

      // Reset button
      const resetBtn = document.getElementById('resetFilters');
      if (resetBtn) resetBtn.addEventListener('click', ()=>{ if(window.applyFilters){ document.getElementById('regionFilter').value=''; document.getElementById('priceMin').value=''; document.getElementById('priceMax').value=''; document.getElementById('bedsMin').value=''; document.getElementById('bedsMax').value=''; document.getElementById('roomsMin').value=''; document.getElementById('roomsMax').value=''; document.getElementById('areaMin').value=''; document.getElementById('areaMax').value=''; document.getElementById('ageMin').value=''; document.getElementById('ageMax').value=''; document.getElementById('incomeMin').value=''; document.getElementById('incomeMax').value=''; window.applyFilters(); } });

      // debug: if housingData already loaded earlier, trigger event to populate UI
      if (Array.isArray(window.housingData) && window.housingData.length) {
        window.dispatchEvent(new Event('housingDataLoaded'));
      }
    })();
  </script>

  <!-- debug quick checks (open console for more detail) -->
  <script>
    console.info('Dashboard loaded. If charts are blank: check Console for errors. Run: console.log(window.housingData?.length)');
  </script>
</body>
</html>
